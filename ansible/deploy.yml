---
- name: Deploy Flask Application

  hosts: webserver

  become: yes

  tasks:

    - name: Update packages
      apt:
        update_cache: yes


    - name: Install docker
      apt:
        name: docker.io
        state: present


    - name: Install git
      apt:
        name: git
        state: present


    - name: Start docker service
      service:
        name: docker
        state: started
        enabled: yes
