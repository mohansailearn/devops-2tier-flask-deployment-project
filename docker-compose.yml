version: "3.8"

services:

  app:

    build:
      context: .
      dockerfile: docker/Dockerfile

    expose:
      - "5000"

    depends_on:
      - db


  db:

    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb


  nginx:

    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

